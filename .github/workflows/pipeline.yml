name: Deployment Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # forces Node.js 24 for all actions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]

defaults:
  run:
    working-directory: ./bloglist-backend   # all commands run inside bloglist-backend

jobs:
  test_and_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install

      - name: Check style (Lint)
        run: npm run lint

      - name: Run Backend Tests
        run: npm test
        env:
          TEST_MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
          SECRET: ${{ secrets.SECRET }}