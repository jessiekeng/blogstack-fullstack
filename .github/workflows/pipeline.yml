name: Deployment Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # forces Node.js 24 for all actions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]

defaults:
  run:
    working-directory: ./bloglist-backend

jobs:
  test_and_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install

      - name: Check style (Lint)
        run: npm run lint

      - name: Run Backend Tests
        run: npm test
        env:
          TEST_MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
          SECRET: ${{ secrets.SECRET }}

  docker_build_and_push:
    runs-on: ubuntu-latest
    needs: test_and_lint   # ensures tests pass before pushing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./bloglist-backend
          load: true
          tags: blogstack-backend:test

      - name: Test Docker Image
        run: |
          echo "Starting test container..."
          docker run -d --name test-backend -p 3003:3003 blogstack-backend:test

          echo "Waiting for the server to start..."
          SUCCESS=0
          for i in {1..10}; do
            if curl -f http://localhost:3003; then
              SUCCESS=1
              echo "Server responded successfully!"
              break
            else
              echo "Attempt $i: server not ready yet, retrying in 2s..."
              sleep 2
            fi
          done

          if [ $SUCCESS -ne 1 ]; then
            echo "Server did not respond after 20s. Showing container logs:"
            docker logs test-backend
            docker stop test-backend
            docker rm test-backend
            exit 1
          fi

          echo "Stopping and removing test container..."
          docker stop test-backend
          docker rm test-backend

      - name: Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./bloglist-backend
          push: true
          tags: mikokeng/blogstack-backend:latest